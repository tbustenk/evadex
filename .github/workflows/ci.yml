name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build base image
        run: docker build -f deploy/Dockerfile -t evadex:latest .
      - name: Test base image
        run: docker run --rm evadex:latest --help
      - name: Build bridge image
        run: docker build -f deploy/Dockerfile.bridge -t evadex-bridge:latest .
      - name: Test bridge health check
        run: |
          docker run -d --name evadex-bridge -p 8081:8081 evadex-bridge:latest
          sleep 5
          curl --fail http://localhost:8081/healthz
          docker stop evadex-bridge

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ || true
      - name: Ruff format check
        run: ruff format --check src/ || true
